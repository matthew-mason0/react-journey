<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

	<script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

		// 1a
        const button = <button>Good job!</button>;

		// 1b
		const paragraph = <p>My name is Matty</p>;
		
		// 1c
		const div = (
			<div>
				<p>Cotton socks</p>
				<p>Price: $10</p>
				<button>Add to Cart</button>
			</div>
		);

		// 1d
		const sockPrice = 10;
		const tShirtPrice = 8;
		const productCost = sockPrice + 2 * tShirtPrice;
		console.log(productCost);

		// 1e
		const paragraph2 = <p>Product Cost: ${productCost}</p>
        
		// 1f
		const shippingCost = 5;
		const div2 = (
			<div>
				<p>Product Cost: ${productCost}</p>
				<p>Shipping Cost: ${shippingCost}</p>
				<p>Total Cost: ${productCost + shippingCost}</p>
				<button>Place your order</button>
			</div>
		);

		// 1g
		const date = dayjs().format('D MMMM');
		console.log(date);

		// 1h
		const paragraph3 = <p>Today is {date}</p>;

		// 1i
		const time = dayjs().format('HH:mm:ss');
		const paragraph4 = <p>Current time: {time}</p>;

        const container = document.querySelector('.js-container');
        // ReactDOM.createRoot(container).render(paragraph4);

		// 1j
		const root = ReactDOM.createRoot(container);

		const paragraph5 = <p>Current time: {dayjs().format('HH:mm:ss')}</p>;
		root.render(paragraph5);
		
		setInterval(() => {
			const paragraph5 = <p>Current time: {dayjs().format('HH:mm:ss')}</p>;
			root.render(paragraph5);
		}, 1000);
    </script>
  </body>
</html>
