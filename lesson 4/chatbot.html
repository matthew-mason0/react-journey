<!DOCTYPE html>
<html>
	<head>
		<title>Chatbot</title>
		<style>
			.send-button {
				background-color: rgb(25, 135, 85);
				color: white;
				padding: 12px 20px;
				margin-left: 10px;
				border: none;
				border-radius: 10px;
				font-size: 15px;
				cursor: pointer;
			}

			.chat-input {
				padding: 12px 15px;
				border-radius: 10px;
				border-width: 1px;
				font-size: 15px;

				flex-grow: 1;
			}

			.chat-input-container {
				display: flex;
			}

			.app-container {
				max-width: 600px;
				margin-left: auto;
				margin-right: auto;
			}
		</style>
	</head>
	<body>
		<div class="js-container"></div>

		<script src="https://unpkg.com/supersimpledev/react.js"></script>
		<script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
		
		<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

		<script src="https://unpkg.com/supersimpledev/babel.js"></script>
		<script type="text/babel">
			function ChatInput({ chatMessages, setChatMessages }) {
				const [inputText, setInputText] = React.useState('');
				const [isLoading, setIsLoading] = React.useState(false);

				function saveInputText(event) {
					setInputText(event.target.value);
				}

				async function sendMessage() {
					if (isLoading || inputText === '') return;
					setIsLoading(true);

					const newChatMessages = [
						...chatMessages,
						{
							message: inputText,
							sender: 'user',
							id: crypto.randomUUID()
						}
					];
					
					setInputText('');
					
					setChatMessages([
						...newChatMessages,
						{
							message: 'Loading...',
							sender: 'robot',
							id: crypto.randomUUID()
						}
					]);

					const response = await Chatbot.getResponseAsync(inputText);

					setChatMessages([
						...newChatMessages,
						{
							message: response,
							sender: 'robot',
							id: crypto.randomUUID()
						}
					]);
					setIsLoading(false);
				}

				function handleKeyDown(event) {
					(event.key === 'Enter') && sendMessage();
					(event.key === 'Escape') && setInputText('');
				}

				return (
					<div className="chat-input-container">
						<input
							className="chat-input"
							placeholder="Send a message to Chatbot"
							size="30"
							onChange={saveInputText}
							onKeyDown={handleKeyDown}
							value={inputText}
						/>
						<button
							className="send-button"
							onClick={sendMessage}
						>Send</button>
					</div>
				);
			}

			function ChatMessage({ message, sender }) {
				return (
					<div>
						{sender === 'robot' && (
							<img src="robot.png" width="50"/>
						)}

						{message}
						
						{sender === 'user' && (
							<img src="user.png" width="50"/>
						)}
					</div>
				);
			}

			function ChatMessages({chatMessages}) {
				return (
					<>
						{chatMessages.map((chatMessage) => {
							return (
								<ChatMessage
									message={chatMessage.message}
									sender={chatMessage.sender}
									key={chatMessage.id}
								/>
							);
						})}
					</>
				);
			}

			function App() {
				// useState produces an array containing the data and a setter function
				// array destructuring used to set elements directly
				const [chatMessages, setChatMessages] = React.useState([{
					message: 'hello chatbot',
					sender: 'user',
					id: 'id1'
				}, {
					message: 'Hello! How can I help you?',
					sender: 'robot',
					id: 'id2'
				}, {
					message: 'can you get me todays date?',
					sender: 'user',
					id: 'id3'
				}, {
					message: 'Today is 15th June',
					sender: 'robot',
					id: 'id4'
				}]);


				return (
					<div className="app-container">
						<ChatInput
							chatMessages={chatMessages}
							setChatMessages={setChatMessages}
						/>
						<ChatMessages chatMessages={chatMessages}/>
					</div>
				)
			}

			const container = document.querySelector('.js-container');
			ReactDOM.createRoot(container).render(<App/>);
		</script>
	</body>
</html>
