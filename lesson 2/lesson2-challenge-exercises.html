<!DOCTYPE html>
<html>
    <head>
        <title>Lesson 2 Challenge Exercises</title>
    </head>
    <body>
        <div class="js-container"></div>
        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            function App() {
                return (
                    <>
                        <ProductDetails product="Cotton Socks" price="10.90" discountPrice="5.45" imageSrc="cotton-socks.png"/>
                        <ProductDetails product="Tennis balls" price="6.00" imageSrc="tennis-balls.png"/>
                        <ProductDetails product="Plain T-Shirt" price="7.99" imageSrc="plain-t-shirt.png"/>
                    </>
                );
            }

            function ProductDetails({ product, price, discountPrice, imageSrc}) {
                return (
                    <div>
                        <img src={imageSrc} width="100"/>
                        <p>{product}</p>

                        {discountPrice ? (
                            <>
                                <p><del>Price: ${price}</del></p>
                                <p>Discount Price: ${discountPrice}</p>
                            </>
                        ) : (
                            <p>Price: ${price}</p>
                        )}

                        <button>Add to Cart</button>
                    </div>
                );
            }

            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App/>);
        </script>
    </body>
</html>
